{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>博客发布</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/index.css' %}">
    <link href="https://unpkg.com/@wangeditor/editor@latest/dist/css/style.css" rel="stylesheet"/>
    <style>
        #editor—wrapper {
            border: 1px solid #ccc;
            z-index: 100; /* 按需定义 */
        }
        #toolbar-container {
            border-bottom: 1px solid #ccc;
        }
        #editor-container {
            height: 500px;
        }
    </style>
</head>

<body>
    <div class="container">
        <header
            class="d-flex flex-wrap align-items-center justify-content-center justify-content-md-between py-3 mb-4 border-bottom">
            <div class="col-md-3 mb-2 mb-md-0">
                <!-- <a href="/" class="d-inline-flex link-body-emphasis text-decoration-none"> -->
                <img class="logo" src="{% static 'image/Blog_logo.png' %}" alt="">
                <!-- </a> -->
            </div>
            <ul class="nav col-12 col-md-auto mb-2 justify-content-center mb-md-0">

                <li>
                    <a href="{% url 'home:index' %}" class="nav-link px-2">首页</a>
                </li>
                <li>
                    <a href="#" class="nav-link px-2">发布博客</a>
                </li>
            </ul>
            <div class="col-md-3 text-end">
                <!-- <button type="button" class="btn btn-outline-primary me-2">登录</button> <button type="button"
                    class="btn btn-primary">注册</button> -->
        </header>
    </div>
    <div class="container mt-3 p-3 rounded-2">
        <h1>博客发布</h1>
        <div class="mt-3">
            <form action="" method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">标题</label>
                    <input id="title" type="text" name="title" class="form-control">
                </div>
                <div class="mb-3">
                    <label for="" class="form-label">内容(暂不支持上传本地视频)</label>
                    <!-- 富文本编辑器 -->
                     <div id="editor—wrapper">
                        <div id="toolbar-container"><!-- 工具栏 --></div>
                        <div id="editor-container"><!-- 编辑器 --></div>
                    </div>
                </div>
                <div class="mb-3 text-end">
                    <button id="pub-button" type="button" class="btn btn-primary">发布</button>
                </div>
            </form>
        </div>
        
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.7/dist/umd/popper.min.js"
    integrity="sha384-zYPOMqeu1DAVkHiLqWBUTcbYfZ8osu1Nd6Z89ify25QV9guujx43ITvfi12/QExE"
    crossorigin="anonymous"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/js/bootstrap.min.js"
    integrity="sha384-heAjqF+bCxXpCWLa6Zhcp4fu20XoNIA98ecBC1YkdXhszjoejr5y9Q77hIrv8R9i"
    crossorigin="anonymous"></script>



    <!-- 富文本编辑器js部分 -->
<script src="https://unpkg.com/@wangeditor/editor@latest/dist/index.js"></script>



    <!-- 调用jquery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"
integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
crossorigin="anonymous">
</script>

<script src="{% static 'js/blog_pub.js' %}"></script>

</html>
