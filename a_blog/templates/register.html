{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>注册</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/index.css' %}">
</head>

<body>
    <div class="container">
        <header
            class="d-flex flex-wrap align-items-center justify-content-center justify-content-md-between py-3 mb-4 border-bottom">
            <div class="col-md-3 mb-2 mb-md-0">
                <!-- <a href="/" class="d-inline-flex link-body-emphasis text-decoration-none"> -->
                <img class="logo" src="{% static 'image/Blog_logo.png' %}" alt="">
                <!-- </a> -->
            </div>
            <ul class="nav col-12 col-md-auto mb-2 justify-content-center mb-md-0">

                <li>
                    <a href="{% url 'home:index' %}" class="nav-link px-2">首页</a>
                </li>
                <li>
                    <a href="#" class="nav-link px-2">发布博客</a>
                </li>
            </ul>
            <div class="col-md-3 text-end">
                <a href="{% url 'Buser:login' %}" type="button" class="btn btn-outline-primary me-2">登录</a>
                <a href="#" type="button" class="btn btn-primary">注册</a>
            </div>
        </header>
    </div>
    <div class="container mt-3 p-3 rounded-2">
        <div style="max-width: 300px;" class="m-auto">
            <h1>注册</h1>
            <form action="" method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="">昵称</label>
                    <input id="username" type="text" name="username" class="form-control" placeholder="请输入昵称">
                </div>
                <div class="mb-3">
                    <label for="">邮箱</label>
                    <input id="email" type="email" name="email" class="form-control" placeholder="请输入邮箱">
                </div>
                <div class="mb-3">
                    <label for="">验证码</label>
                    <div class="input-group mb-3">
                        <input id="captcha" name="captcha" type="text" class="form-control" placeholder="请输入验证码" aria-label="请输入验证码" aria-describedby="button-addon2">
                        <button class="btn btn-outline-secondary" type="button" id="button-addon2">发送验证码</button>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="">密码</label>
                    <input id="password" type="password" name="password" class="form-control" placeholder="请输入密码，长度不能小于8">
                </div>
                <div class="mb-3">
                    <button type="button" id="register-button" class="btn btn-primary w-100">注册</button>
                </div>
            </form>
        </div>


    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.7/dist/umd/popper.min.js"
    integrity="sha384-zYPOMqeu1DAVkHiLqWBUTcbYfZ8osu1Nd6Z89ify25QV9guujx43ITvfi12/QExE"
    crossorigin="anonymous"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/js/bootstrap.min.js"
    integrity="sha384-heAjqF+bCxXpCWLa6Zhcp4fu20XoNIA98ecBC1YkdXhszjoejr5y9Q77hIrv8R9i"
    crossorigin="anonymous"></script>

<!-- 调用jquery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"
integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
crossorigin="anonymous">
</script>

<script src="{% static 'js/register.js' %}"></script>

</html>
